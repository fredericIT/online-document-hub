# ──────────────────────────────────────────────
# Render Blueprint — Infrastructure as Code
# Deploys both services from one repo.
# ──────────────────────────────────────────────

services:
  # ─── Spring Boot Backend ───
  - type: web
    name: online-doc-hub-backend
    runtime: docker
    dockerfilePath: ./online document hub/Dockerfile
    dockerContext: ./online document hub
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: ADMIN_PRIMARY_USERNAME
        sync: false
      - key: ADMIN_PRIMARY_PASSWORD
        sync: false
      - key: ADMIN_STANDARD_USERNAME
        sync: false
      - key: ADMIN_STANDARD_PASSWORD
        sync: false

  # ─── React Frontend (Static Site) ───
  - type: web
    name: online-doc-hub-frontend
    runtime: static
    buildCommand: cd "online doc hub frontend" && npm install && npm run build
    staticPublishPath: ./online doc hub frontend/build
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
