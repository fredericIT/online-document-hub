spring.application.name=online-document-hub

# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=${PORT:8081}

# ──────────────────────────────────────────────
# Database — TiDB Cloud (MySQL-compatible)
# Set TIDB_HOST / TIDB_PORT / TIDB_DATABASE /
# TIDB_USERNAME / TIDB_PASSWORD in Render env vars.
# Falls back to local MySQL for dev.
# ──────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/online_document_hub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ──────────────────────────────────────────────
# File Upload
# ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:uploads}

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
logging.level.com.test=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:DEBUG}

# ──────────────────────────────────────────────
# Email (Gmail SMTP)
# ──────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:vazelodie096@gmail.com}
spring.mail.password=${MAIL_PASSWORD:gkjl rkaz bpku unha}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ──────────────────────────────────────────────
# CORS — Frontend URL
# ──────────────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:3000}

# ──────────────────────────────────────────────
# Admin Seed Credentials (DataInitializer)
