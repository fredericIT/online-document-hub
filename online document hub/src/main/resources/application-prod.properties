# ──────────────────────────────────────────────
# Production Profile Overrides
# Activated when SPRING_PROFILES_ACTIVE=prod
# ──────────────────────────────────────────────

# Reduce SQL verbosity in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Safer DDL — schema must be managed manually after first deploy
# On first deploy, keep 'update'. Once schema is created, switch to 'validate'
spring.jpa.hibernate.ddl-auto=update

# Quieter logging in production
logging.level.com.test=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
